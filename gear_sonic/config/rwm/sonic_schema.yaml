# SONIC release tracking schema for RWM-U dataset/exporter alignment.
# Matches +exp=manager/universal_token/all_modes/sonic_release unless overridden.

action:
  group: system_action
  terms:
    - name: joint_pos
      dim: 29
      source: isaaclab.envs.mdp.actions.JointPositionActionCfg
      config: gear_sonic/config/manager_env/actions/terms/joint_pos.yaml
      notes: raw policy action is scaled and offset by default joint positions before PD control

policy_observation:
  group: actor_obs
  config: gear_sonic/config/manager_env/observations/policy/local_dir_hist.yaml
  dim: 930
  concatenate_terms: true
  terms:
    - {name: gravity_dir, source: gear_sonic.envs.manager_env.mdp.gravity_dir, dim: 30, base_dim: 3, history_length: 10}
    - {name: base_ang_vel, source: isaaclab.envs.mdp.base_ang_vel, dim: 30, base_dim: 3, history_length: 10}
    - {name: joint_pos, source: isaaclab.envs.mdp.joint_pos_rel, dim: 290, base_dim: 29, history_length: 10}
    - {name: joint_vel, source: isaaclab.envs.mdp.joint_vel_rel, dim: 290, base_dim: 29, history_length: 10}
    - {name: actions, source: isaaclab.envs.mdp.last_action, dim: 290, base_dim: 29, history_length: 10}

critic_observation:
  group: critic_obs
  config: gear_sonic/config/manager_env/observations/critic/privileged_mf_hist.yaml
  dim: 1645
  concatenate_terms: true
  terms:
    - {name: command_multi_future, source: gear_sonic.envs.manager_env.mdp.command_multi_future, dim: 580, base_dim: 58, num_future_frames: 10}
    - {name: motion_anchor_pos_b, source: gear_sonic.envs.manager_env.mdp.motion_anchor_pos_b, dim: 3}
    - {name: motion_anchor_ori_b, source: gear_sonic.envs.manager_env.mdp.motion_anchor_ori_b, dim: 6}
    - {name: body_pos, source: gear_sonic.envs.manager_env.mdp.robot_body_pos_b, dim: 42, base_dim: 42}
    - {name: body_ori, source: gear_sonic.envs.manager_env.mdp.robot_body_ori_b, dim: 84, base_dim: 84}
    - {name: base_lin_vel, source: isaaclab.envs.mdp.base_lin_vel, dim: 30, base_dim: 3, history_length: 10}
    - {name: base_ang_vel, source: isaaclab.envs.mdp.base_ang_vel, dim: 30, base_dim: 3, history_length: 10}
    - {name: joint_pos, source: isaaclab.envs.mdp.joint_pos_rel, dim: 290, base_dim: 29, history_length: 10}
    - {name: joint_vel, source: isaaclab.envs.mdp.joint_vel_rel, dim: 290, base_dim: 29, history_length: 10}
    - {name: actions, source: isaaclab.envs.mdp.last_action, dim: 290, base_dim: 29, history_length: 10}

tokenizer_observation:
  group: tokenizer
  config: gear_sonic/config/manager_env/observations/tokenizer/unitoken_all_noz.yaml
  concatenate_terms: false
  terms:
    - {name: encoder_index, dim: [3]}
    - {name: command_multi_future_nonflat, dim: [10, 58]}
    - {name: command_z_multi_future_nonflat, dim: [10, 1]}
    - {name: motion_anchor_ori_b_mf_nonflat, dim: [10, 6]}
    - {name: command_multi_future_lower_body, dim: [240]}
    - {name: vr_3point_local_target, dim: [9]}
    - {name: vr_3point_local_orn_target, dim: [12]}
    - {name: motion_anchor_ori_b, dim: [6]}
    - {name: command_z, dim: [1]}
    - {name: smpl_joints_multi_future_local_nonflat, dim: [10, 72]}
    - {name: smpl_root_ori_b_multi_future, dim: [10, 6]}
    - {name: joint_pos_multi_future_wrist_for_smpl, dim: [10, 6]}

reward:
  group: system_extension
  config: gear_sonic/config/manager_env/rewards/tracking/base_5point_local_feet_acc.yaml
  terms:
    - {name: tracking_anchor_pos, source: gear_sonic.envs.manager_env.mdp.tracking_anchor_pos_error}
    - {name: tracking_anchor_ori, source: gear_sonic.envs.manager_env.mdp.tracking_anchor_ori_error}
    - {name: tracking_relative_body_pos, source: gear_sonic.envs.manager_env.mdp.tracking_relative_body_pos_error}
    - {name: tracking_relative_body_ori, source: gear_sonic.envs.manager_env.mdp.tracking_relative_body_ori_error}
    - {name: tracking_body_linvel, source: gear_sonic.envs.manager_env.mdp.tracking_body_linvel_error}
    - {name: tracking_body_angvel, source: gear_sonic.envs.manager_env.mdp.tracking_body_angvel_error}
    - {name: action_rate_l2, source: isaaclab.envs.mdp.action_rate_l2}
    - {name: joint_limit, source: isaaclab.envs.mdp.joint_pos_limits}
    - {name: undesired_contacts, source: isaaclab.envs.mdp.undesired_contacts}
    - {name: anti_shake_ang_vel, source: gear_sonic.envs.manager_env.mdp.anti_shake_ang_vel_l2}
    - {name: tracking_vr_5point_local, source: gear_sonic.envs.manager_env.mdp.tracking_local_vr_5point_error}
    - {name: feet_acc, source: isaaclab.envs.mdp.joint_acc_l2, override_weight_in_sonic_release: -2.5e-6}

termination:
  group: system_termination
  config: gear_sonic/config/manager_env/terminations/tracking/base_adaptive_strict_ori_foot_xyz.yaml
  notes: keep learned terminations separate from timeout for PPO bootstrap correction
  terms:
    - {name: anchor_pos, source: gear_sonic.envs.manager_env.mdp.exceeded_anchor_height, threshold: 0.15, adaptive: true}
    - {name: anchor_ori_full, source: gear_sonic.envs.manager_env.mdp.exceeded_anchor_ori, threshold: 0.2}
    - {name: ee_body_pos, source: gear_sonic.envs.manager_env.mdp.exceeded_body_height, threshold: 0.15, adaptive: true}
    - {name: foot_pos_xyz, source: gear_sonic.envs.manager_env.mdp.exceeded_body_pos, threshold: 0.2}
    - {name: time_out, source: gear_sonic.envs.manager_env.mdp.tracking_time_out, learned: false}

tracked_bodies:
  anchor_body: pelvis
  reward_point_body: [torso_link, left_wrist_yaw_link, right_wrist_yaw_link]
  body_names:
    - pelvis
    - left_hip_roll_link
    - left_knee_link
    - left_ankle_roll_link
    - right_hip_roll_link
    - right_knee_link
    - right_ankle_roll_link
    - torso_link
    - left_shoulder_roll_link
    - left_elbow_link
    - left_wrist_yaw_link
    - right_shoulder_roll_link
    - right_elbow_link
    - right_wrist_yaw_link


rwm_u_dynamics_schema:
  name: sonic-rwmu-physx-v1
  purpose: Isaac/PhysX-only transition target for SONIC-specific RWM-U training
  tensor_layout:
    state: [steps, num_envs, state_dim]
    next_state: [steps, num_envs, state_dim]
    action: [steps, num_envs, 29]
    extension: [steps, num_envs, 0]
    contact: [steps, num_envs, contact_sensor_body_count]
    termination: [steps, num_envs, 0]
  dimension_policy: derive state_dim/contact_dim from exported Isaac robot.data and contact sensor fields; do not hard-code 262 or 470
  state_dim_formula: 22 + joint_pos_dim + joint_vel_dim + body_pos_w_dim + body_quat_w_dim + body_lin_vel_w_dim + body_ang_vel_w_dim
  state_terms_preferred:
    - {name: root_pos_w, source: robot.data.root_pos_w, dim: 3}
    - {name: root_quat_w, source: robot.data.root_quat_w, dim: 4}
    - {name: root_lin_vel_w, source: robot.data.root_lin_vel_w, dim: 3}
    - {name: root_ang_vel_w, source: robot.data.root_ang_vel_w, dim: 3}
    - {name: root_lin_vel_b, source: robot.data.root_lin_vel_b, dim: 3}
    - {name: root_ang_vel_b, source: robot.data.root_ang_vel_b, dim: 3}
    - {name: projected_gravity_b, source: robot.data.projected_gravity_b, dim: 3}
    - {name: joint_pos, source: robot.data.joint_pos, dim: num_joints}
    - {name: joint_vel, source: robot.data.joint_vel, dim: num_joints}
    - {name: body_pos_w, source: robot.data.body_pos_w, dim: num_robot_bodies x 3}
    - {name: body_quat_w, source: robot.data.body_quat_w, dim: num_robot_bodies x 4}
    - {name: body_lin_vel_w, source: robot.data.body_lin_vel_w, dim: num_robot_bodies x 3}
    - {name: body_ang_vel_w, source: robot.data.body_ang_vel_w, dim: num_robot_bodies x 3}
  action_terms:
    - {name: isaac_joint_position_action, source: ManagerEnvWrapper._last_env_actions_to_sim, dim: 29}
  extension_terms: []
  contact_terms:
    - {name: contact_forces, source: next_robot_state.contact_forces_net_forces_w, dim: contact_sensor_body_count, threshold_newton: 1.0}
  termination_terms: []
  diagnostic_terms:
    - {name: reward_total, source: env.step.reward, dim: 1}
    - {name: done_excluding_timeout, source: dones AND NOT time_outs, dim: 1}
  smoke_fallback:
    notes: RWM smoke has no physical robot state; exporter marks missing terms as missing_zero_fallback and the dataset is only for plumbing tests.
